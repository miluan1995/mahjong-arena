<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麻将竞技场 - Mahjong Arena</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a472a; overflow: hidden; font-family: 'PingFang SC','Microsoft YaHei',sans-serif; }
canvas { display: block; }
#info { position: fixed; top: 8px; left: 8px; color: #afd9a0; font-size: 12px; z-index: 10; pointer-events: none; }
</style>
</head>
<body>
<div id="info">麻将竞技场 v0.2</div>
<canvas id="c"></canvas>
<script>
const TW=44,TH=60,TR=5,GAP=3,MELD_GAP=10;
const C={
  tileFace:'#f5f0e1',wan:'#c0392b',tiao:'#27ae60',tong:'#2980b9',
  tileShadow:'rgba(0,0,0,0.22)',playerTag:'#ecf0f1',discardBg:'rgba(0,0,0,0.12)',
  meldBg:'rgba(255,255,255,0.06)'
};
const SL={wan:'万',tiao:'条',tong:'筒'};
const RL=['','一','二','三','四','五','六','七','八','九'];

const cv=document.getElementById('c'), ctx=cv.getContext('2d');
let W,H,cx,cy,dpr;
function resize(){
  dpr=devicePixelRatio||1; W=innerWidth; H=innerHeight;
  cv.width=W*dpr; cv.height=H*dpr;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0); cx=W/2; cy=H/2;
}
addEventListener('resize',()=>{resize();render();}); resize();

// ---- roundRect ----
function rr(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ---- 画单张牌 ----
function drawTile(x,y,suit,rank,opts={}){
  const{scale=1,faceDown=false,highlight=false,rot=0}=opts;
  const w=TW*scale, h=TH*scale;
  ctx.save(); ctx.translate(x+w/2,y+h/2);
  if(rot)ctx.rotate(rot); ctx.translate(-w/2,-h/2);
  ctx.shadowColor=C.tileShadow;ctx.shadowBlur=3*scale;ctx.shadowOffsetY=2;
  rr(0,0,w,h,TR*scale);
  if(faceDown){
    ctx.fillStyle='#2e7d32';ctx.fill();ctx.strokeStyle='#1b5e20';ctx.lineWidth=1;ctx.stroke();
    ctx.shadowColor='transparent';ctx.fillStyle='#256029';rr(3*scale,3*scale,w-6*scale,h-6*scale,3*scale);ctx.fill();
  }else{
    ctx.fillStyle=highlight?'#ffeaa7':C.tileFace;ctx.fill();
    ctx.strokeStyle='#bbb';ctx.lineWidth=0.8;ctx.stroke();ctx.shadowColor='transparent';
    if(suit&&rank){
      const fs=Math.floor(18*scale),ss=Math.floor(12*scale);
      ctx.fillStyle=C[suit]||'#2c3e50';
      ctx.font=`bold ${fs}px 'PingFang SC',sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(RL[rank],w/2,h*0.38);
      ctx.font=`${ss}px 'PingFang SC',sans-serif`;ctx.fillText(SL[suit],w/2,h*0.7);
    }
  }
  ctx.restore();
}

// ---- 画一组副露 ----
function drawMeld(x,y,tiles,scale=0.6){
  const sw=TW*scale, gap=2;
  for(let i=0;i<tiles.length;i++){
    drawTile(x+i*(sw+gap),y,tiles[i].suit,tiles[i].rank,{scale});
  }
  return tiles.length*(sw+gap);
}

// ---- 牌桌 ----
function drawTable(){
  const g=ctx.createRadialGradient(cx,cy,50,cx,cy,Math.max(W,H)*0.7);
  g.addColorStop(0,'#1f8c47');g.addColorStop(1,'#145a2e');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // 中央标题
  ctx.fillStyle='rgba(255,255,255,0.06)';
  ctx.font='bold 28px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('麻 将 竞 技 场',cx,cy);
}

// ---- 模拟数据 ----
const suits=['wan','tiao','tong'];
function rTile(){return{suit:suits[Math.random()*3|0],rank:(Math.random()*9|0)+1};}
function mkHand(n=13){const h=[];for(let i=0;i<n;i++)h.push(rTile());h.sort((a,b)=>{const o={wan:0,tiao:1,tong:2};return(o[a.suit]*10+a.rank)-(o[b.suit]*10+b.rank);});return h;}
function mkDiscards(n){const d=[];for(let i=0;i<n;i++)d.push(rTile());return d;}
function mkMelds(){
  const melds=[];
  if(Math.random()>0.4){
    const s=suits[Math.random()*3|0],r=(Math.random()*9|0)+1;
    melds.push([{suit:s,rank:r},{suit:s,rank:r},{suit:s,rank:r}]);
  }
  if(Math.random()>0.6){
    const s=suits[Math.random()*3|0],r=(Math.random()*7|0)+1;
    melds.push([{suit:s,rank:r},{suit:s,rank:r+1},{suit:s,rank:r+2}]);
  }
  return melds;
}

const PLAYERS=[
  {name:'黑瞎子 🐻',style:'激进'},
  {name:'铁柱 🔨',style:'保守'},
  {name:'算盘 🧮',style:'计算'},
  {name:'锦鲤 🐟',style:'混沌'},
];
const hands=PLAYERS.map(()=>mkHand());
const discards=PLAYERS.map(()=>mkDiscards(3+Math.random()*6|0));
const melds=PLAYERS.map(()=>mkMelds());

function drawTag(x,y,p){
  ctx.fillStyle='rgba(0,0,0,0.5)';rr(x-55,y-12,110,24,12);ctx.fill();
  ctx.fillStyle=C.playerTag;ctx.font='12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(p.name,x,y);
}

// ==== 底部玩家（我）====
function drawBottom(){
  const hand=hands[0], dc=discards[0], ml=melds[0];
  const handW=hand.length*(TW+GAP)-GAP;
  // 副露区（手牌右侧）
  let meldTotalW=0;
  for(const m of ml) meldTotalW+=m.length*(TW*0.6+2)+MELD_GAP;
  const totalW=handW+(meldTotalW>0?MELD_GAP+meldTotalW:0);
  const sx=cx-totalW/2;
  const y=H-TH-28;

  // 名牌
  drawTag(cx,y-16,PLAYERS[0]);

  // 手牌
  for(let i=0;i<hand.length;i++){
    drawTile(sx+i*(TW+GAP),y,hand[i].suit,hand[i].rank);
  }

  // 副露
  let mx=sx+handW+MELD_GAP;
  for(const m of ml){
    // 副露背景
    const mw=m.length*(TW*0.6+2);
    ctx.fillStyle=C.meldBg;rr(mx-2,y+TH*0.15,mw+4,TH*0.7,4);ctx.fill();
    drawMeld(mx,y+TH*0.2,m,0.6);
    mx+=mw+MELD_GAP;
  }

  // 弃牌区（手牌上方，个人面前）
  const dcScale=0.55;
  const dcTW=TW*dcScale+2;
  const maxPerRow=8;
  const dcRows=Math.ceil(dc.length/maxPerRow);
  const dcStartY=y-20-(dcRows*(TH*dcScale+3));
  for(let i=0;i<dc.length;i++){
    const row=Math.floor(i/maxPerRow);
    const col=i%maxPerRow;
    const rowLen=Math.min(maxPerRow,dc.length-row*maxPerRow);
    const rowStartX=cx-rowLen*dcTW/2;
    drawTile(rowStartX+col*dcTW,dcStartY+row*(TH*dcScale+3),dc[i].suit,dc[i].rank,{scale:dcScale});
  }
}

// ==== 上方玩家 ====
function drawTop(){
  const hand=hands[2], dc=discards[2], ml=melds[2];
  const handW=hand.length*(TW*0.65+2)-2;
  let meldTotalW=0;
  for(const m of ml) meldTotalW+=m.length*(TW*0.5+2)+MELD_GAP;
  const totalW=handW+(meldTotalW>0?MELD_GAP+meldTotalW:0);
  const sx=cx-totalW/2;
  const y=25;
  const sc=0.65;

  // 手牌（牌背）
  for(let i=0;i<hand.length;i++){
    drawTile(sx+i*(TW*sc+2),y,null,null,{scale:sc,faceDown:true});
  }

  // 副露
  let mx=sx+handW+MELD_GAP;
  for(const m of ml){
    drawMeld(mx,y+TH*sc*0.15,m,0.5);
    mx+=m.length*(TW*0.5+2)+MELD_GAP;
  }

  // 名牌
  drawTag(cx,y+TH*sc+14,PLAYERS[2]);

  // 弃牌区（名牌下方）
  const dcScale=0.5;
  const dcTW=TW*dcScale+2;
  const maxPerRow=8;
  const dcStartY=y+TH*sc+28;
  for(let i=0;i<dc.length;i++){
    const row=Math.floor(i/maxPerRow);
    const col=i%maxPerRow;
    const rowLen=Math.min(maxPerRow,dc.length-row*maxPerRow);
    const rowStartX=cx-rowLen*dcTW/2;
    drawTile(rowStartX+col*dcTW,dcStartY+row*(TH*dcScale+3),dc[i].suit,dc[i].rank,{scale:dcScale});
  }
}

// ==== 右侧玩家 ====
function drawRight(){
  const hand=hands[1], dc=discards[1], ml=melds[1];
  const sc=0.6;
  const tileStep=TW*sc+2;
  const handH=hand.length*tileStep;
  const x=W-TH*sc-30;
  const sy=cy-handH/2;

  // 手牌（竖排，牌背）
  for(let i=0;i<hand.length;i++){
    drawTile(x,sy+i*tileStep,null,null,{scale:sc,faceDown:true,rot:Math.PI/2});
  }

  // 名牌
  drawTag(x-25,sy-16,PLAYERS[1]);

  // 副露（手牌左侧偏上）
  let my=sy;
  for(const m of ml){
    for(let j=0;j<m.length;j++){
      drawTile(x-TH*0.5-8,my+j*(TW*0.45+2),m[j].suit,m[j].rank,{scale:0.45,rot:Math.PI/2});
    }
    my+=m.length*(TW*0.45+2)+6;
  }

  // 弃牌区（左侧，个人面前）
  const dcScale=0.48;
  const dcStep=TW*dcScale+2;
  const maxPerCol=6;
  const dcStartX=x-TH*sc-20;
  for(let i=0;i<dc.length;i++){
    const col=Math.floor(i/maxPerCol);
    const row=i%maxPerCol;
    const dx=dcStartX-col*(TH*dcScale+3);
    const dy=cy-Math.min(maxPerCol,dc.length)*dcStep/2+row*dcStep;
    drawTile(dx,dy,dc[i].suit,dc[i].rank,{scale:dcScale,rot:Math.PI/2});
  }
}

// ==== 左侧玩家 ====
function drawLeft(){
  const hand=hands[3], dc=discards[3], ml=melds[3];
  const sc=0.6;
  const tileStep=TW*sc+2;
  const handH=hand.length*tileStep;
  const x=30;
  const sy=cy-handH/2;

  // 手牌（竖排，牌背）
  for(let i=0;i<hand.length;i++){
    drawTile(x,sy+i*tileStep,null,null,{scale:sc,faceDown:true,rot:-Math.PI/2});
  }

  // 名牌
  drawTag(x+TH*sc+25,sy-16,PLAYERS[3]);

  // 副露（手牌右侧偏上）
  let my=sy;
  for(const m of ml){
    for(let j=0;j<m.length;j++){
      drawTile(x+TH*sc+8,my+j*(TW*0.45+2),m[j].suit,m[j].rank,{scale:0.45,rot:-Math.PI/2});
    }
    my+=m.length*(TW*0.45+2)+6;
  }

  // 弃牌区（右侧，个人面前）
  const dcScale=0.48;
  const dcStep=TW*dcScale+2;
  const maxPerCol=6;
  const dcStartX=x+TH*sc+20;
  for(let i=0;i<dc.length;i++){
    const col=Math.floor(i/maxPerCol);
    const row=i%maxPerCol;
    const dx=dcStartX+col*(TH*dcScale+3);
    const dy=cy-Math.min(maxPerCol,dc.length)*dcStep/2+row*dcStep;
    drawTile(dx,dy,dc[i].suit,dc[i].rank,{scale:dcScale,rot:-Math.PI/2});
  }
}

// ==== HUD ====
function drawHUD(){
  ctx.fillStyle='rgba(0,0,0,0.5)';rr(cx-30,cy-15,60,30,8);ctx.fill();
  ctx.fillStyle='#ffd700';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('余 56',cx,cy);
}

// ==== 渲染 ====
function render(){
  ctx.clearRect(0,0,W,H);
  drawTable();
  drawBottom();
  drawTop();
  drawRight();
  drawLeft();
  drawHUD();
}
render();
</script>
</body>
</html>
